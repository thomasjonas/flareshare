name = "flareshare"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# All runtime variables are set via Cloudflare Pages dashboard (or `wrangler pages secret put`).
# For local dev, copy .dev.vars.example → .dev.vars and fill in the values.
#
# R2 access is entirely via signed requests (aws4fetch) using R2_ENDPOINT / R2_BUCKET
# from those variables — there is no native R2 binding, so no bucket_name is declared here.
